<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes documents · qr-doc-share</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- En-tête applicatif : marque à gauche, utilisateur + déconnexion à droite -->
  <header class="entete">
    <div class="entete-contenu">
      <a class="marque" href="/mes-documents.html" id="marque"></a>
      <div class="entete-utilisateur">
        <strong id="label-utilisateur"></strong>
        <span id="badge-admin" class="badge" hidden>admin</span>
        <button id="btn-deconnexion" class="btn-icone" title="Se déconnecter"
                aria-label="Se déconnecter"></button>
      </div>
    </div>
  </header>

  <!-- Navigation principale : onglets + bouton d'import toujours accessible -->
  <nav class="barre-nav" aria-label="Navigation principale">
    <div class="barre-nav-contenu">
      <button class="onglet-nav actif" data-vue="documents">Mes documents</button>
      <button class="onglet-nav" data-vue="emails">Emails collectés</button>
      <button class="onglet-nav" data-vue="legacy" id="onglet-legacy" hidden>Documents legacy</button>
      <span class="pousse-droite">
        <button id="btn-importer" class="btn btn-primaire"></button>
      </span>
    </div>
  </nav>

  <main class="contenu">
    <!-- Titre de la vue courante (repère « où suis-je ») + outils de la vue -->
    <div class="entete-vue">
      <h1 id="titre-vue">Mes documents</h1>
      <!-- Sélecteur Les miens / Tous (admin uniquement, vue documents) -->
      <div class="segmente" id="segmente-scope" hidden>
        <button data-scope="mine" class="actif">Les miens</button>
        <button data-scope="all">Tous les documents</button>
      </div>
      <p class="aide" id="aide-vue" hidden></p>
    </div>

    <!-- Outils de la vue Emails collectés -->
    <div id="outils-emails" class="ligne-boutons" style="margin-bottom: var(--e4)" hidden>
      <select id="filtre-label" style="width:auto" hidden>
        <option value="">Tous les propriétaires</option>
      </select>
      <button id="btn-export-csv" class="btn btn-secondaire"></button>
    </div>

    <!-- Liste de la vue courante (documents, emails ou legacy) -->
    <div id="conteneur-liste"></div>
  </main>

  <script src="/js/vendor/qrcode.min.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/documents.js"></script>
</body>
</html>
