<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion · qr-doc-share</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Écran de connexion : saisie du code à 6 chiffres, vérifié uniquement
       côté serveur. Une fois validé, on atterrit sur « Mes documents ». -->
  <main class="page-centree">
    <div class="carte">
      <div class="marque marque-centree" id="marque"></div>
      <h1 style="text-align:center">Connexion</h1>
      <p class="aide" style="text-align:center; margin-bottom: var(--e4)">
        Saisissez votre code d'accès pour gérer et partager vos documents.
      </p>
      <form id="form-code">
        <div class="groupe-champ">
          <label for="champ-code">Code d'accès</label>
          <input type="text" id="champ-code" class="champ-code" inputmode="numeric"
                 pattern="[0-9]{6}" maxlength="6" placeholder="••••••"
                 autocomplete="one-time-code" required>
          <p class="aide">Ce code est vérifié par notre serveur, il ne circule jamais en clair dans la page.</p>
        </div>
        <button type="submit" id="btn-code" class="btn btn-primaire btn-large">Se connecter</button>
      </form>
    </div>
  </main>

  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
